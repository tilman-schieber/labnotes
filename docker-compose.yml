services:
  postgres:
    image: postgres:16
    container_name: labnotes-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-labnotes}
      POSTGRES_USER: ${POSTGRES_USER:-labnotes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-labnotes}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - labnotes-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-labnotes} -d ${POSTGRES_DB:-labnotes}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  labnotes-postgres-data:
